<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Time Validation Using JS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  
  <h1>REAL TIME VALIDATION USING JS</h1>
  <hr>

  <div class="box">
   <form id="loginForm">
    <div class="row">
    <label>Email:</label>
    <input type="text" id="email" placeholder="myname@gmail.com">
    </div>

    <div class="row">
    <label>Password:</label>
    <input type="password" id="password" placeholder="........">
    </div>

    <div class="row">
    <label>Age:</label>
    <input type="number" id="age">
    </div>

    <button type="submit">Login</button>
    </form>
  </div>

  <p id="message"></p>

  <script src="script.js"></script>
</body>
</html>
